# Zabbix Agent / Agent2 user parameters for ups-pi-node.
# Install as: /etc/zabbix/zabbix_agent2.d/ups-pi-node.conf
#
# If UPS_PI_NODE_INTEGRATIONS_TOKEN is configured, add:
#   -H 'X-UPS-PI-NODE-Token: <token>'
# to each curl command below.

UserParameter=ups-pi-node.metrics,curl -fsS http://127.0.0.1:8000/api/integrations/zabbix
UserParameter=ups-pi-node.discovery,curl -fsS http://127.0.0.1:8000/api/integrations/zabbix/discovery
UserParameter=ups-pi-node.metric[*],curl -fsS http://127.0.0.1:8000/api/integrations/zabbix/$1
