<div class="card">
    <h2 id="status-title" class="{{ data.state }}" style="text-align: center; margin: 10px 0;">
        {{ t("ups.state." ~ data.state) }} ({{ data.percent }}%)
    </h2>

    <div class="battery-container">
        <div id="battery-bar" class="battery-bar" style="width: {{ data.percent }}%; background: {{ data.color }};"></div>
    </div>

    <div class="val" id="val-v" style="color: var(--yellow); font-size: 2.5em;">{{ "%.2f"|format(data.v) }}V</div>
    <div class="val" id="val-i" style="color: var(--cyan); font-size: 1.8em;">{{ "%.0f"|format(data.i) }}mA</div>

    <div style="font-size: 0.8em; color: var(--muted); margin-top: 20px; padding-top: 10px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; flex-wrap: wrap;">
        <div>AC: <b id="ac-status" style="color: {{ 'var(--green)' if data.ac else 'var(--red)' }}">{{ t("ups.ac_ok") if data.ac else t("ups.ac_lost") }}</b></div>
        <div>CPU: <b id="cpu-temp">{{ data.cpu }}</b>&deg;C</div>
        <div>RAM: <b id="ram-info">{{ t("ups.loading") }}</b></div>
    </div>
</div>
